name: Build Assistane Viewer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron-viewer/package-lock.json
      - run: npm ci
      - name: Create build config
        run: |
          node -e "require('fs').writeFileSync('app-config.local.json', JSON.stringify({ apiBaseUrl: process.env.BASE44_DEVICE_API_URL || '', apiKey: process.env.BASE44_DEVICE_API_KEY || '' }, null, 2))"
        env:
          BASE44_DEVICE_API_URL: ${{ secrets.BASE44_DEVICE_API_URL }}
          BASE44_DEVICE_API_KEY: ${{ secrets.BASE44_DEVICE_API_KEY }}
      - run: npm run build:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: assistane-viewer-windows
          path: electron-viewer/dist/*.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: electron-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron-viewer/package-lock.json
      - run: npm ci
      - name: Create build config
        run: |
          node -e "require('fs').writeFileSync('app-config.local.json', JSON.stringify({ apiBaseUrl: process.env.BASE44_DEVICE_API_URL || '', apiKey: process.env.BASE44_DEVICE_API_KEY || '' }, null, 2))"
        env:
          BASE44_DEVICE_API_URL: ${{ secrets.BASE44_DEVICE_API_URL }}
          BASE44_DEVICE_API_KEY: ${{ secrets.BASE44_DEVICE_API_KEY }}
      - run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: assistane-viewer-macos
          path: electron-viewer/dist/*.dmg
