<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RemotePilot — Screen Sharing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1623; color: #c9d1e0; padding: 20px;
      font-size: 12px; text-align: center;
    }
    h2 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3b82f6;
      display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status { font-size: 11px; color: #6b7a99; margin-top: 6px; min-height: 16px; }
    #log    { margin-top: 8px; font-size: 10px; color: #4a5570; font-family: monospace; }
    .err    { color: #f87171 !important; }
    .ok     { color: #34d399 !important; }
  </style>
</head>
<body>
  <h2><span class="dot"></span>Screen Sharing</h2>
  <div id="status">Waiting for session request…</div>
  <div id="log"></div>

  <script>
    /* eslint-disable */
    "use strict";

    const { ipcRenderer, clipboard } = require("electron");
    const fs = require("fs");
    const path = require("path");
    const os = require("os");

    const statusEl = document.getElementById("status");
    const logEl    = document.getElementById("log");
    const fileTransfers = {};

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || "";
      logEl.textContent = new Date().toLocaleTimeString() + " — " + msg;
      console.log("[screen-share]", msg);
    }

    const RTC_CONFIG = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
      ],
      iceTransportPolicy: "all",
    };

    function waitForICE(pc) {
      if (pc.iceGatheringState === "complete") return Promise.resolve();
      return new Promise((resolve) => {
        // Shorter timeout = faster connect (3s instead of 8s)
        const timer = setTimeout(resolve, 3000);
        const handler = () => {
          if (pc.iceGatheringState === "complete") {
            clearTimeout(timer);
            pc.removeEventListener("icegatheringstatechange", handler);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", handler);
      });
    }

    function qualityConstraints(quality) {
      const profiles = {
        ultra: { width: 3840, frameRate: 60 },
        high: { width: 1920, frameRate: 30 },
        medium: { width: 1280, frameRate: 20 },
        low: { width: 960, frameRate: 12 },
      };
      const profile = profiles[quality] || profiles.high;
      return { width: { max: profile.width }, frameRate: { max: profile.frameRate } };
    }

    async function applyLiveQuality(signalId, quality) {
      const session = sessions[signalId];
      const track = session?.stream?.getVideoTracks?.()[0];
      if (!track) return;
      try {
        await track.applyConstraints(qualityConstraints(quality));
        setStatus(`Video quality changed to ${quality}`, "ok");
      } catch (err) {
        console.warn("[quality] applyConstraints failed:", err.message);
      }
    }

    async function parseApiJson(res, endpoint) {
      const text = await res.text();
      const contentType = res.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        return text ? JSON.parse(text) : {};
      }
      const preview = text.replace(/\s+/g, " ").trim().slice(0, 160);
      throw new Error(`API returned ${contentType || "non-JSON"} for ${endpoint}. Response: ${preview}`);
    }

    function shouldTryFunctionBodyFallback(status, data) {
      const message = `${data?.message || data?.error || data?.detail || ""}`;
      return (
        status === 404 ||
        status === 405 ||
        /Backend function .*not found|not deployed|Method Not Allowed/i.test(message)
      );
    }

    async function apiPost(apiBaseUrl, apiKey, endpoint, body) {
      const baseUrl = apiBaseUrl.replace(/\/$/, "");
      const headers = { "Content-Type": "application/json" };
      if (apiKey) headers["x-api-key"] = apiKey;
      const payload = { ...body, endpoint };
      const urls = [`${baseUrl}/${endpoint}`, baseUrl];
      let lastError = null;

      for (const url of urls) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers,
            body: JSON.stringify(payload),
          });
          const data = await parseApiJson(res, endpoint);
          if (url !== baseUrl && shouldTryFunctionBodyFallback(res.status, data)) {
            console.warn(`[api] POST ${endpoint} via ${url} returned ${res.status}; trying function body fallback`);
            continue;
          }
          if (!res.ok) throw new Error(data?.error || `Backend HTTP ${res.status}`);
          return data;
        } catch (err) {
          lastError = err;
          console.warn(`[api] POST ${endpoint} via ${url} failed:`, err.message);
        }
      }

      throw lastError;
    }

    let activePc     = null;
    let activeStream = null;
    // Map signalId -> pc so we can handle multiple concurrent sessions
    const sessions = {};

    function cleanup(signalId) {
      if (signalId && sessions[signalId]) {
        const { pc, stream } = sessions[signalId];
        if (sessions[signalId].disconnectTimer) clearTimeout(sessions[signalId].disconnectTimer);
        if (pc) pc.close();
        if (stream) stream.getTracks().forEach(t => t.stop());
        delete sessions[signalId];
        return;
      }
      // Fallback: clean all
      Object.values(sessions).forEach(s => {
        if (s.disconnectTimer) clearTimeout(s.disconnectTimer);
        if (s.pc) s.pc.close();
        if (s.stream) s.stream.getTracks().forEach(t => t.stop());
      });
      Object.keys(sessions).forEach(k => delete sessions[k]);
    }

    // ── Clipboard sync: send clipboard text to viewer on change ─────────────
    let lastClipboard = "";
    setInterval(async () => {
      try {
        const text = clipboard.readText();
        if (text !== lastClipboard) {
          lastClipboard = text;
          // Notify all active data channels
          Object.values(sessions).forEach(s => {
            if (s.dc && s.dc.readyState === "open") {
              s.dc.send(JSON.stringify({ type: "clipboard_from_target", text }));
            }
          });
        }
      } catch (_) {}
    }, 1500);

    // ── Main handler — invoked by main process via IPC ──────────────────────
    ipcRenderer.on("start-sharing", async (_e, payload) => {
      const { apiBaseUrl, apiKey, registrationToken, signalId, offerSdp, videoConstraints } = payload;

      // Clean up previous session for this signalId if any
      cleanup(signalId);

      try {
        // ── 1. Acquire screen stream ─────────────────────────────────────────
        setStatus("Capturing display…");
        const stream = await navigator.mediaDevices.getUserMedia(videoConstraints);

        const [videoTrack] = stream.getVideoTracks();
        const settings = videoTrack.getSettings();
        setStatus(`Stream acquired — ${settings.width}×${settings.height} @ ${settings.frameRate}fps`);

        // ── 2. Create RTCPeerConnection ──────────────────────────────────────
        const pc = new RTCPeerConnection(RTC_CONFIG);
        sessions[signalId] = { pc, stream, dc: null };

        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        // ── 3. Apply remote offer ────────────────────────────────────────────
        await pc.setRemoteDescription({ type: "offer", sdp: offerSdp });
        setStatus("Offer received — creating answer…");

        // ── 4. Create + apply local answer ───────────────────────────────────
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        // ── 5. Wait for ICE (short 3s timeout) ───────────────────────────────
        setStatus("Gathering ICE candidates…");
        await waitForICE(pc);

        // ── 6. POST answer to backend immediately ────────────────────────────
        setStatus("Sending answer to server…");
        await apiPost(apiBaseUrl, apiKey, "webrtc-answer", {
          registration_token: registrationToken,
          signal_id: signalId,
          answer_sdp: pc.localDescription.sdp,
        });

        setStatus("✓ Streaming — P2P connection active", "ok");

        // ── 7. Handle incoming DataChannel (control + clipboard) ─────────────
        pc.ondatachannel = (event) => {
          const dc = event.channel;
          dc.binaryType = "arraybuffer";
          if (sessions[signalId]) sessions[signalId].dc = dc;
          dc.onmessage = async (msg) => {
            try {
              if (msg.data instanceof ArrayBuffer) {
                const active = Object.values(fileTransfers).find(t => t.active);
                if (active) ipcRenderer.send("file-transfer-chunk", { id: active.id, chunk: msg.data });
                return;
              }
              if (typeof Blob !== "undefined" && msg.data instanceof Blob) {
                const active = Object.values(fileTransfers).find(t => t.active);
                if (active) ipcRenderer.send("file-transfer-chunk", { id: active.id, chunk: await msg.data.arrayBuffer() });
                return;
              }
              const data = JSON.parse(msg.data);
              if (data.type === "key") {
                ipcRenderer.send("key-event", data);
              } else if (data.type === "file") {
                ipcRenderer.send("file-drop", data);
              } else if (data.type === "file_start") {
                fileTransfers[data.id] = { id: data.id, active: true };
                ipcRenderer.send("file-transfer-start", data);
              } else if (data.type === "file_end") {
                if (fileTransfers[data.id]) fileTransfers[data.id].active = false;
                ipcRenderer.send("file-transfer-end", data);
              } else if (data.type === "clipboard_to_target") {
                clipboard.writeText(data.text || "");
                lastClipboard = data.text;
                dc.send(JSON.stringify({ type: "clipboard_to_target_ack", ok: true, text: data.text || "" }));
                if (data.paste) {
                  setTimeout(() => {
                    ipcRenderer.send("key-event", {
                      type: "key",
                      key: "v",
                      code: "KeyV",
                      ctrl: process.platform !== "darwin",
                      meta: process.platform === "darwin",
                      alt: false,
                      shift: false,
                    });
                  }, 80);
                }
              } else if (data.type === "clipboard_request") {
                dc.send(JSON.stringify({ type: "clipboard_from_target", text: clipboard.readText() || "" }));
              } else if (data.type === "chat_message") {
                ipcRenderer.send("chat-message", { content: data.content || "" });
              } else if (data.type === "set_quality") {
                applyLiveQuality(signalId, data.quality || "high");
              } else if (data.type === "remote_fs_list") {
                sendRemoteFileList(dc, data.path || "");
              } else if (data.type === "remote_file_request") {
                sendRemoteFile(dc, data);
              } else if (data.type === "viewer_command") {
                const command = data.command || "";
                if (["lock", "ctrl-alt-del", "win-l"].includes(command)) {
                  dc.send(JSON.stringify({
                    type: "system_state",
                    state: "locking",
                    message: "Remote computer is locking. The operating system may pause the live video on the secure password screen; Assistane will reconnect automatically after unlock.",
                  }));
                }
                ipcRenderer.send("viewer-command", { command: data.command || "" });
              } else if (data.type === "black_screen") {
                ipcRenderer.send("black-screen-toggle", { enabled: data.enabled === true, message: data.message || "" });
              } else if (data.type === "screenshot_request") {
                ipcRenderer.send("screenshot-request", { signalId, dc_label: dc.label });
              } else {
                ipcRenderer.send("mouse-event", data);
              }
            } catch (_) {}
          };
        };

        // ── 8. Monitor connection health ─────────────────────────────────────
        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          if (s === "connected" && sessions[signalId]?.disconnectTimer) {
            clearTimeout(sessions[signalId].disconnectTimer);
            sessions[signalId].disconnectTimer = null;
          }
          if (s === "disconnected") {
            setStatus("Connection paused - waiting for recovery");
            if (sessions[signalId] && !sessions[signalId].disconnectTimer) {
              sessions[signalId].disconnectTimer = setTimeout(() => cleanup(signalId), 20000);
            }
            return;
          }
          if (s === "failed" || s === "closed") {
            setStatus(`Session ended (${s})`);
            cleanup(signalId);
            return;
          }
          console.log(`[webrtc] connectionState → ${s}`);
          if (s === "connected") {
            setStatus("✓ Peer connected — live stream active", "ok");
          } else if (s === "disconnected" || s === "failed" || s === "closed") {
            setStatus(`Session ended (${s})`);
            cleanup(signalId);
          }
        };

        pc.oniceconnectionstatechange = () => {
          console.log(`[webrtc] iceConnectionState → ${pc.iceConnectionState}`);
        };

      } catch (err) {
        setStatus("Error: " + err.message, "err");
        console.error("[screen-share] fatal:", err);
        cleanup(signalId);
      }
    });

    ipcRenderer.on("stop-sharing", (_e, signalId) => {
      setStatus("Session stopped by server");
      cleanup(signalId);
    });

    function defaultRemotePath() {
      return os.homedir() || (process.platform === "win32" ? "C:\\" : "/");
    }

    function listWindowsRoots() {
      const roots = [];
      for (let code = 67; code <= 90; code++) {
        const root = String.fromCharCode(code) + ":\\";
        try {
          if (fs.existsSync(root)) roots.push({
            name: root,
            path: root,
            isDirectory: true,
            size: 0,
            modified: "",
          });
        } catch (_) {}
      }
      return roots;
    }

    function safeListPath(requestedPath) {
      const raw = String(requestedPath || "").trim();
      if (!raw) return defaultRemotePath();
      return raw;
    }

    function sendRemoteFileList(dc, requestedPath) {
      try {
        if (process.platform === "win32" && String(requestedPath || "").trim() === "roots") {
          dc.send(JSON.stringify({ type: "remote_fs_list", path: "roots", entries: listWindowsRoots() }));
          return;
        }

        const folderPath = safeListPath(requestedPath);
        const stat = fs.statSync(folderPath);
        if (!stat.isDirectory()) {
          dc.send(JSON.stringify({ type: "remote_fs_error", message: "Selected remote path is not a folder." }));
          return;
        }

        const entries = fs.readdirSync(folderPath, { withFileTypes: true })
          .map((entry) => {
            const entryPath = path.join(folderPath, entry.name);
            let entryStat = null;
            try { entryStat = fs.statSync(entryPath); } catch (_) {}
            return {
              name: entry.name,
              path: entryPath,
              isDirectory: entry.isDirectory(),
              size: entryStat?.size || 0,
              modified: entryStat?.mtime ? entryStat.mtime.toLocaleString() : "",
            };
          })
          .sort((a, b) => Number(b.isDirectory) - Number(a.isDirectory) || a.name.localeCompare(b.name));

        if (process.platform === "win32" && /^[a-z]:\\?$/i.test(folderPath)) {
          entries.unshift(...listWindowsRoots().filter((root) => root.path.toLowerCase() !== folderPath.toLowerCase()));
        }

        dc.send(JSON.stringify({ type: "remote_fs_list", path: folderPath, entries }));
      } catch (err) {
        dc.send(JSON.stringify({ type: "remote_fs_error", message: err.message || "Could not read remote folder." }));
      }
    }

    async function sendRemoteFile(dc, data) {
      const id = String(data.id || "");
      const filePath = String(data.path || "");
      if (!id || !filePath) return;

      try {
        const stat = fs.statSync(filePath);
        if (!stat.isFile()) {
          dc.send(JSON.stringify({ type: "remote_fs_error", message: "Selected remote item is not a file." }));
          return;
        }

        dc.send(JSON.stringify({ type: "remote_file_start", id, name: path.basename(filePath), size: stat.size }));
        const stream = fs.createReadStream(filePath, { highWaterMark: 64 * 1024 });
        for await (const chunk of stream) {
          while (dc.bufferedAmount > 2 * 1024 * 1024) await new Promise((resolve) => setTimeout(resolve, 25));
          dc.send(chunk);
        }
        dc.send(JSON.stringify({ type: "remote_file_end", id, name: path.basename(filePath), size: stat.size }));
      } catch (err) {
        dc.send(JSON.stringify({ type: "remote_fs_error", message: err.message || "Could not send remote file." }));
      }
    }
  </script>
</body>
</html>
